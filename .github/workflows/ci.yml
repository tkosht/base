name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.claude/**'
      - '.codex/config.toml'
      - '.codex/version.json'
      - '.cursor/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'README.md'
      - 'Makefile'
      - 'bin/**'
      - 'docker/**'
      - 'compose.yml'
      - 'compose.override.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'docs/04.knowledge/base_harness_set.md'
      - 'docs/04.knowledge/base_harness_set.toml'
      - 'memory-bank/**'
      - 'tests/codex_subagent/**'
      - 'tests/test_base_harness_set.py'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [ main ]
    paths:
      - '.claude/**'
      - '.codex/config.toml'
      - '.codex/version.json'
      - '.cursor/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'README.md'
      - 'Makefile'
      - 'bin/**'
      - 'docker/**'
      - 'compose.yml'
      - 'compose.override.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'docs/04.knowledge/base_harness_set.md'
      - 'docs/04.knowledge/base_harness_set.toml'
      - 'memory-bank/**'
      - 'tests/codex_subagent/**'
      - 'tests/test_base_harness_set.py'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync --all-groups --all-extras

      - name: Run linters
        run: |
          uv run ruff check .
          uv run black --check .

      - name: Run harness tests
        run: |
          uv run pytest -q tests/test_base_harness_set.py tests/codex_subagent
