name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.claude/**'
      - '.codex/config.toml'
      - '.codex/version.json'
      - '.cursor/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'README.md'
      - 'Makefile'
      - 'bin/**'
      - 'docker/**'
      - 'compose.yml'
      - 'compose.override.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'docs/**'
      - 'scripts/**'
      - 'templates/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [ main ]
    paths:
      - '.claude/**'
      - '.codex/config.toml'
      - '.codex/version.json'
      - '.cursor/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'README.md'
      - 'Makefile'
      - 'bin/**'
      - 'docker/**'
      - 'compose.yml'
      - 'compose.override.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'docs/**'
      - 'scripts/**'
      - 'templates/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Validate harness structure
        run: make doctor

      - name: Run linters
        run: make lint

      - name: Run harness tests
        run: make test
