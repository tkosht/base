name: Harness Autoptimizer

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this manual harness run is needed"
        required: false
        type: string
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-agent-controller:
    runs-on: ubuntu-latest

    steps:
      - name: Check Codex auth
        id: codex-auth
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          if [ -z "$CODEX_AUTH_JSON" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "CODEX_AUTH_JSON secret is not configured; skipping harness autoptimizer."
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        if: steps.codex-auth.outputs.available == 'true'
        uses: actions/checkout@v6

      - name: Set up uv
        if: steps.codex-auth.outputs.available == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Set up Node.js
        if: steps.codex-auth.outputs.available == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.codex-auth.outputs.available == 'true'
        run: |
          uv sync --all-groups --all-extras
          sh bin/install_codexcli.sh

      - name: Preflight Codex auth
        if: steps.codex-auth.outputs.available == 'true'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          test -n "$CODEX_AUTH_JSON" || {
            echo "CODEX_AUTH_JSON became unavailable after the auth check."
            exit 1
          }
          mkdir -p "$RUNNER_TEMP/codex-home"
          printf '%s' "$CODEX_AUTH_JSON" > "$RUNNER_TEMP/codex-home/auth.json"
          cp .codex/config.toml "$RUNNER_TEMP/codex-home/config.toml"

      - name: Build Codex agent controller prompt
        if: steps.codex-auth.outputs.available == 'true'
        run: |
          uv run python .claude/skills/harness-autoptimizer/scripts/harness_autopt.py \
            --print-controller-prompt > "$RUNNER_TEMP/harness-autopt-controller.md"

      - name: Run Codex agent controller
        if: steps.codex-auth.outputs.available == 'true'
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
          GH_TOKEN: ${{ github.token }}
        run: |
          export VOLTA_HOME="${VOLTA_HOME:-$HOME/.volta}"
          export PATH="$VOLTA_HOME/bin:$PATH"
          uv run python .claude/skills/codex-subagent/scripts/codex_exec.py \
            --mode single \
            --task-type code_gen \
            --sandbox workspace-write \
            --timeout 1200 \
            --json \
            --prompt "$(cat "$RUNNER_TEMP/harness-autopt-controller.md")"
