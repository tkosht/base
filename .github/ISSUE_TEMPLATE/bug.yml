name: Bug report
description: Report a defect in the template or generated repo workflow
labels: ["bug", "triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: What failed?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      placeholder: List the exact commands or steps.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation notes
      placeholder: Include test output, logs, or screenshots as needed.
