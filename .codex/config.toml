projects = { "/home/devuser/workspace" = { trust_level = "trusted" } }
model = "gpt-5.4"
model_provider = "openai"
approval_policy = "never"
sandbox_mode = "workspace-write"
# この template の shipped default は、承認待ちを挟まない代わりに
# workspace-write と network_access=false に留める reviewed default。
# generated repo は bootstrap 時に .codex/config.toml を見直し、
# threat model に応じて on-request / danger-full-access へ明示的に調整する。
# full access は既定にしない。必要時だけ明示的に緩和する。
# approval_policy = "on-request"
# sandbox_mode = "danger-full-access"

model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
personality = "pragmatic"
service_tier = "fast"


[sandbox_workspace_write]
network_access = false

[profiles.very-fast]
model_reasoning_effort = "minimal"

[profiles.fast]
model_reasoning_effort = "low"

[profiles.base]
model_reasoning_effort = "medium"

[profiles.deep]
model_reasoning_effort = "high"

[sandbox_read_only]
network_access = false
